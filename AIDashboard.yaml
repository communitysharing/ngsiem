  065e704e-84ea-474a-8777-c59607ac9084:
    x: 8
    y: 24
    height: 4
    queryString: |-
      #repo = "zscaler"
      | "#event.dataset" = "zia.web"
      | Vendor.hostname = /\.(openai\.com|chatgpt\.com|claude\.ai|anthropic\.com|perplexity\.ai|x\.ai|mistral\.ai|deepseek\.com|huggingface\.co|copilot\.microsoft\.com|copilot\.azure\.com|gemini\.google\.com|aistudio\.google\.com|cursor\.com|cursor\.sh|codeium\.com)$|\.ai$/i
      | Vendor.hostname != /visualstudio\.com/i
      | case {
          Vendor.hostname = /openai\.com|chatgpt\.com/i | Platform := "OpenAI" ;
          Vendor.hostname = /claude\.ai|anthropic\.com/i | Platform := "Anthropic" ;
          Vendor.hostname = /gemini\.google\.com|aistudio\.google\.com/i | Platform := "Google AI" ;
          Vendor.hostname = /copilot\.microsoft\.com|copilot\.azure\.com/i | Platform := "Microsoft Copilot" ;
          Vendor.hostname = /deepseek\.com/i | Platform := "DeepSeek" ;
          Vendor.hostname = /perplexity\.ai/i | Platform := "Perplexity" ;
          * | Platform := "Other AI" ;
        }
      | Day := formatTime(format="%Y-%m-%d", field=@timestamp)
      | HourSlot := formatTime(format="%Y-%m-%d %H", field=@timestamp)
      | groupBy([Vendor.user, Platform, Day], function=count(HourSlot, distinct=true, as="ActiveHours"))
      | case {
          ActiveHours <= 1 | UsageLevel := "1. Minimal (1 active hour)" ;
          ActiveHours <= 3 | UsageLevel := "2. Light (2-3 active hours)" ;
          ActiveHours <= 6 | UsageLevel := "3. Moderate (4-6 active hours)" ;
          * | UsageLevel := "4. Heavy (7+ active hours)" ;
        }
      | groupBy(UsageLevel, function=[count(as="UserPlatformSessions"), count(Vendor.user, distinct=true, as="UniqueUsers")])
      | sort(UsageLevel, order=asc, limit=50)
      | table([UsageLevel, UserPlatformSessions, UniqueUsers])
    visualization: pie-chart
    end: now
    start: 1d
    width: 3
    title: Active hours (at least 1 request/hour)
    isLive: false
    type: query
  97e33c13-3159-4038-8030-c7ba13146b36:
    x: 0
    y: 24
    height: 4
    queryString: |-
      #repo = "zscaler"
      | "#event.dataset" = "zia.web"
      | Vendor.hostname = /\.(openai\.com|chatgpt\.com|claude\.ai|anthropic\.com|perplexity\.ai|x\.ai|mistral\.ai|deepseek\.com|huggingface\.co|copilot\.microsoft\.com|copilot\.azure\.com|gemini\.google\.com|aistudio\.google\.com|cursor\.com|cursor\.sh|codeium\.com)$|\.ai$/i
      | Vendor.requestmethod = "POST"
      | Vendor.filetype != "None"
      | Vendor.filetype != ""
      | Vendor.filetype = *
      | case {
          Vendor.hostname = /openai\.com|chatgpt\.com/i | Platform := "OpenAI" ;
          Vendor.hostname = /claude\.ai|anthropic\.com/i | Platform := "Anthropic" ;
          Vendor.hostname = /gemini\.google\.com|aistudio\.google\.com/i | Platform := "Google AI" ;
          Vendor.hostname = /copilot\.microsoft\.com|copilot\.azure\.com/i | Platform := "Microsoft Copilot" ;
          Vendor.hostname = /deepseek\.com/i | Platform := "DeepSeek" ;
          Vendor.hostname = /perplexity\.ai/i | Platform := "Perplexity" ;
          * | Platform := "Other AI" ;
        }
      | case {
          Vendor.filetype = /GZIP|ZST|ZIP/i AND Vendor.url = /\.(docx|xlsx|pptx|doc|xls|ppt)/i | FileCategory := "Office Document (compressed)" ;
          Vendor.filetype = /GZIP|ZST|ZIP/i AND Vendor.contenttype = /officedocument|msword|ms-excel|ms-powerpoint/i | FileCategory := "Office Document (compressed)" ;
          Vendor.filetype = /GZIP|ZST/i | FileCategory := "Likely Office (compressed data)" ;
          Vendor.filetype = /ZIP/i | FileCategory := "ZIP Archive" ;
          Vendor.filetype = /PDF/i | FileCategory := "PDF" ;
          Vendor.filetype = /PNG|JPG|JPEG|GIF|SVG|WEBP/i | FileCategory := "Image" ;
          Vendor.filetype = /CSV|TSV/i | FileCategory := "Spreadsheet Data" ;
          Vendor.filetype = /JSON|XML/i | FileCategory := "Structured Data" ;
          Vendor.filetype = /PY|JS|TS|JAVA|CPP|CS|GO|RS|SH|PS1/i | FileCategory := "Source Code" ;
          Vendor.filetype = /TXT|MD|LOG/i | FileCategory := "Text File" ;
          * | FileCategory := Vendor.filetype ;
        }
      | sankey(source=FileCategory, target=Platform)
    visualization: sankey
    end: now
    start: 7d
    width: 5
    title: File Types Uploaded to AI Platforms
    isLive: false
    type: query
