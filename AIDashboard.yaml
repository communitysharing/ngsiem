  57442949-7cd1-478a-93a2-68866a78265e:
    x: 0
    y: 16
    height: 4
    queryString: |-
      #repo = "zscaler"
      | "#event.dataset" = "zia.web"
      | Vendor.hostname = /\.(openai\.com|chatgpt\.com|claude\.ai|anthropic\.com|perplexity\.ai|x\.ai|mistral\.ai|deepseek\.com|huggingface\.co|copilot\.microsoft\.com|copilot\.azure\.com|gemini\.google\.com|aistudio\.google\.com|cursor\.com|cursor\.sh|codeium\.com|cohere\.com|cohere\.ai|stability\.ai|midjourney\.com)$|\.ai$/i
      | case {
          Vendor.hostname = /openai\.com|chatgpt\.com/i | Platform := "OpenAI" ;
          Vendor.hostname = /claude\.ai|anthropic\.com/i | Platform := "Anthropic" ;
          Vendor.hostname = /gemini\.google\.com|aistudio\.google\.com/i | Platform := "Google AI" ;
          Vendor.hostname = /copilot\.microsoft\.com|copilot\.azure\.com/i | Platform := "Microsoft Copilot" ;
          Vendor.hostname = /deepseek\.com/i | Platform := "DeepSeek" ;
          Vendor.hostname = /perplexity\.ai/i | Platform := "Perplexity" ;
          Vendor.hostname = /cursor\.com|cursor\.sh|codeium\.com/i | Platform := "AI Code Editors" ;
          Vendor.hostname = /huggingface\.co/i | Platform := "Hugging Face" ;
          * | Platform := Vendor.hostname ;
        }
      | RequestMB := Vendor.requestsize / 1024 / 1024
      | ResponseMB := Vendor.responsesize / 1024 / 1024
      | groupBy([Vendor.user, Vendor.department, Platform], function=[sum(RequestMB, as="UploadMB"), sum(ResponseMB, as="DownloadMB"), count(as="Requests")])
      | sort(UploadMB, order=desc, limit=25)
      | table([Vendor.user, Vendor.department, Platform, Requests, UploadMB, DownloadMB])
    end: now
    start: 7d
    width: 11
    options:
      cell-overflow: wrap-text
      column-overflow: truncate
      configured-columns: {}
      row-numbers-enabled: false
    visualization: table-view
    title: Data Transfer Volume to AI Platforms (Zscaler)
    isLive: false
    type: query
