          RootDomain="*suno.ai" OR RootDomain="*udio.com" OR RootDomain="*elevenlabs.io" | Platform := "Audio AI" ;
          RootDomain="*cursor.com" OR RootDomain="*cursor.sh" OR RootDomain="*codeium.com" OR RootDomain="*tabnine.com" OR RootDomain="*replit.com" | Platform := "AI Code Editors" ;
