            RootDomain="*chatgpt.com" OR
            RootDomain="*ai.com" OR
            RootDomain="*claude.ai" OR
            RootDomain="*anthropic.com" OR
            RootDomain="*perplexity.ai" OR
            RootDomain="*x.ai" OR
            RootDomain="*mistral.ai" OR
            RootDomain="*gemini.google.com" OR
            RootDomain="*aistudio.google.com" OR
            RootDomain="*copilot.microsoft.com" OR
            RootDomain="*copilot.azure.com" OR
            RootDomain="*llama.meta.com" OR
            RootDomain="*stability.ai" OR
            RootDomain="*deepseek.com" OR
            RootDomain="*chat.deepseek.com" OR
            RootDomain="*huggingface.co" OR
            RootDomain="*cohere.com" OR
            RootDomain="*cohere.ai" OR
            RootDomain="*inflection.ai" OR
            RootDomain="*pi.ai" OR
            RootDomain="*midjourney.com" OR
            RootDomain="*runway.ml" OR
            RootDomain="*runwayml.com" OR
            RootDomain="*poe.com" OR
            RootDomain="*you.com" OR
            RootDomain="*character.ai" OR
            RootDomain="*jasper.ai" OR
            RootDomain="*writesonic.com" OR
            RootDomain="*copy.ai" OR
            RootDomain="*notion.ai" OR
            RootDomain="*replit.com" OR
            RootDomain="*cursor.com" OR
            RootDomain="*cursor.sh" OR
            RootDomain="*codeium.com" OR
            RootDomain="*tabnine.com" OR
            RootDomain="*github.com" OR
            RootDomain="*suno.ai" OR
            RootDomain="*udio.com" OR
            RootDomain="*elevenlabs.io" OR
            RootDomain="*descript.com" OR
            RootDomain="*firefly.adobe.com" OR
            RootDomain="*leonardo.ai" OR
            RootDomain="*ideogram.ai" OR
            RootDomain="*.ai"
          | case {
              RootDomain="*openai.com" OR RootDomain="*chatgpt.com" OR RootDomain="*ai.com" | Platform := "OpenAI" ;
              RootDomain="*claude.ai" OR RootDomain="*anthropic.com" | Platform := "Anthropic" ;
              RootDomain="*gemini.google.com" OR RootDomain="*aistudio.google.com" | Platform := "Google AI" ;
              RootDomain="*copilot.microsoft.com" OR RootDomain="*copilot.azure.com" OR RootDomain="*github.com" | Platform := "Microsoft AI" ;
              RootDomain="*deepseek.com" OR RootDomain="*chat.deepseek.com" | Platform := "DeepSeek" ;
              RootDomain="*perplexity.ai" | Platform := "Perplexity" ;
              RootDomain="*x.ai" | Platform := "xAI (Grok)" ;
              RootDomain="*mistral.ai" | Platform := "Mistral" ;
              RootDomain="*llama.meta.com" | Platform := "Meta AI" ;
              RootDomain="*huggingface.co" | Platform := "Hugging Face" ;
              RootDomain="*cohere.com" OR RootDomain="*cohere.ai" | Platform := "Cohere" ;
              RootDomain="*inflection.ai" OR RootDomain="*pi.ai" | Platform := "Inflection (Pi)" ;
              RootDomain="*stability.ai" OR RootDomain="*midjourney.com" OR RootDomain="*leonardo.ai" OR RootDomain="*ideogram.ai" OR RootDomain="*firefly.adobe.com" | Platform := "Image Generation" ;
              RootDomain="*runway.ml" OR RootDomain="*runwayml.com" OR RootDomain="*descript.com" | Platform := "Video/Media AI" ;
              RootDomain="*suno.ai" OR RootDomain="*udio.com" OR RootDomain="*elevenlabs.io" | Platform := "Audio AI" ;
              RootDomain="*cursor.com" OR RootDomain="*cursor.sh" OR RootDomain="*codeium.com" OR RootDomain="*tabnine.com" OR RootDomain="*replit.com" | Platform := "AI Code Editors" ;
