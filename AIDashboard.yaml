          RootDomain="*inflection.ai" OR RootDomain="*pi.ai" | Platform := "Inflection (Pi)" ;
          RootDomain="*stability.ai" OR RootDomain="*midjourney.com" OR RootDomain="*leonardo.ai" OR RootDomain="*ideogram.ai" OR RootDomain="*firefly.adobe.com" | Platform := "Image Generation" ;
