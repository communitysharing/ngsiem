              RootDomain="*jasper.ai" OR RootDomain="*writesonic.com" OR RootDomain="*copy.ai" OR RootDomain="*notion.ai" | Platform := "AI Writing Tools" ;
              * | Platform := "Other (.ai domain)" ;
            }
          | groupBy(ComputerName, function=count(Platform, distinct=true, as="UniquePlatforms"), limit=10000)
          | sort(UniquePlatforms, order=desc)
          | head(10)
