    queryString: |-
      defineTable(
        name="userLookup",
        query={
          #repo = "base_sensor"
          | "#event_simpleName" = ProcessRollup2
          | UserName = *
          | UserName != /\$$/ | UserName != /Local Service/i
          | groupBy(aid, function=selectLast(UserName), limit=10000)
        },
        include=[aid, UserName]
      )
      | defineTable(
        name="sprawlEndpoints",
        query={
          #repo = "base_sensor"
          | "#event_simpleName" = DnsRequest
          | RootDomain := DomainName
